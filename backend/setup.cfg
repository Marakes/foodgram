[flake8]
ignore =
    W503
exclude =
    tests/,
    */migrations/,
    data/
    venv/,
    env/,
    docs/,
    frontend/,
    infra/,
    .git,
    __pycache__,
    */static/*,
    */media/*
per-file-ignores =
    */settings.py:E501

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["backend", "api", "recipes", "users"]
